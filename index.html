<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APL / AFC Official Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { 
            --afc-gold: #c5a059; 
            --afc-black: #000000;
            --neon-blue: #00f2ff;
            --glass-white: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--afc-black);
            color: white;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- HOME PAGE / LOGIN --- */
        .home-view {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }

        .sponsor-logo {
            width: 180px; height: auto; margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.4));
        }

        .apl-title { font-family: 'Bebas Neue'; font-size: 45px; letter-spacing: 2px; color: var(--afc-gold); }
        .apl-title span { color: white; }

        .login-card {
            background: var(--glass-white); backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 160, 89, 0.2); padding: 30px; border-radius: 20px;
            width: 100%; max-width: 350px; margin-top: 25px;
        }

        .pin-input {
            width: 100%; padding: 15px; text-align: center; background: rgba(0,0,0,0.6);
            border: 1px solid var(--afc-gold); color: var(--afc-gold); border-radius: 10px;
            font-size: 18px; margin-bottom: 15px; font-family: 'Bebas Neue';
        }

        /* --- DASHBOARD STYLING --- */
        #dashboard { display: none; width: 100%; padding-bottom: 120px; }
        header { background: #0a0a0a; padding: 15px; text-align: center; border-bottom: 3px solid var(--afc-gold); }
        
        .timer-card { background: linear-gradient(180deg, #000, #1a472a); padding: 25px; text-align: center; border-bottom: 1px solid var(--afc-gold); }
        .timer-hud { font-family: 'Bebas Neue'; font-size: 90px; color: var(--afc-gold); line-height: 1; cursor: pointer; }
        
        .section { padding: 15px; max-width: 650px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        
        .score-display { font-family: 'Bebas Neue'; font-size: 70px; color: white; background: transparent; border: none; text-align: center; width: 85px; }
        .draw-panel { background: rgba(0,0,0,0.9); border: 2px solid var(--neon-blue); border-radius: 15px; padding: 20px; margin-top: 15px; display: none; }

        .btn-gold { width: 100%; padding: 18px; background: var(--afc-gold); color: black; border: none; border-radius: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border-top: 4px solid var(--afc-gold); }
        
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; margin-top: 10px; }
        th { background: #000; color: var(--afc-gold); padding: 12px; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: 700; }
    </style>
</head>
<body>

<div id="loginView" class="home-view">
    <img src="48981.jpg" alt="AFC Logo" class="sponsor-logo">
    
    <div class="apl-title">APL / <span>AFC</span></div>
    <div style="font-size: 10px; letter-spacing: 4px; color: #666; margin-top: 5px;">AJJOOR PREMIER LEAGUE 2026</div>

    <div class="login-card">
        <input type="password" id="pin" class="pin-input" placeholder="ADMIN PIN">
        <button class="btn-gold" onclick="auth()">START MATCH CENTER</button>
    </div>
</div>

<div id="dashboard">
    <header><div style="font-family:'Bebas Neue'; font-size: 24px;">APL / <span>AFC HUB</span></div></header>
    
    <div class="timer-card">
        <div id="stageLabel" style="font-weight:900; color:var(--afc-gold); font-size:11px; margin-bottom:5px;">MATCH READY</div>
        <div class="timer-hud" id="timeDisp" onclick="manualTimeEdit()">08:00</div>
        <div style="font-size: 8px; color: #666; margin-bottom: 10px;">(TAP NUMBERS TO EDIT TIME)</div>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="ctrlTimer()" id="tBtn" style="background:var(--afc-gold); border:none; padding:10px 25px; border-radius:5px; font-weight:900;">START</button>
            <button onclick="fullRst()" style="background:white; border:none; padding:10px 15px; border-radius:5px; font-weight:900;">↺</button>
        </div>
    </div>

    <section class="section">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; text-align: center;">
                <div style="flex:1">
                    <input type="text" id="tAName" placeholder="HOME" style="text-align: center; border: none; font-weight: 900; background: transparent; color: white; width: 100%; border-bottom: 1px solid var(--neon-blue);">
                    <input type="number" id="sA" value="0" class="score-display">
                </div>
                <div style="font-family: 'Bebas Neue'; color: var(--afc-gold); font-size: 30px;">VS</div>
                <div style="flex:1">
                    <input type="text" id="tBName" placeholder="AWAY" style="text-align: center; border: none; font-weight: 900; background: transparent; color: white; width: 100%; border-bottom: 1px solid var(--neon-blue);">
                    <input type="number" id="sB" value="0" class="score-display">
                </div>
            </div>

            <div id="drawPanel" class="draw-panel">
                <h3 style="color:var(--neon-blue); font-size:12px; margin-bottom:15px; font-weight:900; text-align:center;">MATCH DRAWN!</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-gold" style="font-size:10px; background:var(--neon-blue);" onclick="triggerExtra()">+5M EXTRA</button>
                    <button class="btn-gold" style="font-size:10px;" onclick="triggerPenalties()">PENALTIES</button>
                </div>
                <div id="penInput" style="display:none; margin-top:15px; text-align:center;">
                    <input type="number" id="pA" value="0" style="width:60px; background:none; border:2px solid gold; color:white; font-size:24px; text-align:center;">
                    <span style="font-family:'Bebas Neue'; margin:0 10px; color:var(--afc-gold);">PK SCORE</span>
                    <input type="number" id="pB" value="0" style="width:60px; background:none; border:2px solid gold; color:white; font-size:24px; text-align:center;">
                </div>
            </div>

            <button class="btn-gold" style="margin-top: 25px;" onclick="saveMatch()">SAVE FINAL RESULT</button>
        </div>

        <table>
            <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>GD</th><th style="color:var(--afc-gold)">PTS</th></tr></thead>
            <tbody id="standingsBody"></tbody>
        </table>
    </section>

    <div class="bottom-nav">
        <button onclick="persist()" style="background:none; border:none; color:var(--neon-blue); font-weight:800;">SAVE ALL</button>
        <button onclick="alert('Shared to Clipboard')" style="background:none; border:none; color:white; font-weight:800;">SHARE</button>
        <button onclick="softReset()" style="background:none; border:none; color:red; font-weight:800;">WIPE</button>
    </div>
</div>

<script>
    let db = {}; let sec = 480; let run = null; let mStage = 1;

    function auth() {
        const pin = document.getElementById('pin').value;
        if(pin === "110710" || pin === "2026") {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else alert("ACCESS DENIED");
    }

    function manualTimeEdit() {
        if (run) { alert("Pause timer first!"); return; }
        let newMin = prompt("Set Match Minutes:", Math.floor(sec/60));
        if (newMin !== null && !isNaN(newMin)) {
            sec = parseInt(newMin) * 60;
            updateT();
            document.getElementById('stageLabel').innerText = "CUSTOM TIME";
        }
    }

    function ctrlTimer() {
        if (run) { clearInterval(run); run = null; document.getElementById('tBtn').innerText = "RESUME"; }
        else {
            document.getElementById('tBtn').innerText = "PAUSE";
            run = setInterval(() => { 
                sec--; updateT(); 
                if (sec <= 0) { clearInterval(run); run = null; nextStage(); }
            }, 1000);
        }
    }

    function nextStage() {
        if(mStage === 1) { mStage = 2; sec = 120; document.getElementById('stageLabel').innerText = "HT BREAK (2M)"; }
        else if(mStage === 2) { mStage = 3; sec = 480; document.getElementById('stageLabel').innerText = "2ND HALF (8M)"; }
        else { 
            document.getElementById('stageLabel').innerText = "FULL TIME";
            if(parseInt(document.getElementById('sA').value) === parseInt(document.getElementById('sB').value)) {
                document.getElementById('drawPanel').style.display = 'block';
            }
        }
        updateT(); document.getElementById('tBtn').innerText = "START";
    }

    function triggerExtra() { mStage = 4; sec = 300; document.getElementById('drawPanel').style.display = 'none'; updateT(); }
    function triggerPenalties() { document.getElementById('penInput').style.display = 'block'; }
    function updateT() {
        let m = Math.floor(sec/60); let s = sec%60;
        document.getElementById('timeDisp').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function fullRst() { clearInterval(run); run = null; sec = 480; mStage = 1; updateT(); document.getElementById('drawPanel').style.display = 'none'; document.getElementById('penInput').style.display = 'none'; }

    function saveMatch() {
        const ta = document.getElementById('tAName').value.toUpperCase() || "TEAM A";
        const tb = document.getElementById('tBName').value.toUpperCase() || "TEAM B";
        const sa = parseInt(document.getElementById('sA').value) || 0;
        const sb = parseInt(document.getElementById('sB').value) || 0;
        const pa = parseInt(document.getElementById('pA').value) || 0;
        const pb = parseInt(document.getElementById('pB').value) || 0;

        if(!db[ta]) db[ta] = {p:0, w:0, gf:0, ga:0, pts:0};
        if(!db[tb]) db[tb] = {p:0, w:0, gf:0, ga:0, pts:0};

        db[ta].p++; db[tb].p++;
        db[ta].gf += sa; db[ta].ga += sb;
        db[tb].gf += sb; db[tb].ga += sa;

        if(sa > sb || (sa === sb && pa > pb)) { db[ta].w++; db[ta].pts += 3; }
        else if(sb > sa || (sa === sb && pb > pa)) { db[tb].w++; db[tb].pts += 3; }

        updStandings(); fullRst(); ['sA','sB','pA','pB'].forEach(i => document.getElementById(i).value = 0);
    }

    function updStandings() {
        const b = document.getElementById('standingsBody'); b.innerHTML = "";
        const sorted = Object.keys(db).sort((x,y) => db[y].pts - db[x].pts || (db[y].gf-db[y].ga) - (db[x].gf-db[x].ga));
        sorted.forEach(t => { b.innerHTML += `<tr><td>${t}</td><td>${db[t].p}</td><td>${db[t].w}</td><td>${db[t].gf - db[t].ga}</td><td style="color:var(--afc-gold)">${db[t].pts}</td></tr>`; });
    }

    function persist() { localStorage.setItem('apl_afc_final', JSON.stringify(db)); alert("DATABASE SYNCED"); }
    function softReset() { if(confirm("Wipe all match statistics?")) { db = {}; updStandings(); fullRst(); } }
</script>
</body>
</html>
