<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APL / AFC Master Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { 
            --afc-gold: #c5a059; --afc-black: #000000; --neon: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Montserrat', sans-serif; background: var(--afc-black); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        .page { display: none; padding-bottom: 120px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { background: #0a0a0a; padding: 15px; text-align: center; border-bottom: 3px solid var(--afc-gold); font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 2px; }
        .section { padding: 15px; max-width: 650px; margin: auto; }
        .card { background: var(--glass); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .btn-gold { width: 100%; padding: 18px; background: var(--afc-gold); color: black; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .input-field { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--afc-gold); color: white; border-radius: 8px; margin-bottom: 10px; }

        /* --- ⏱️ 8-2-8 TIMER HUB --- */
        .timer-card { background: linear-gradient(180deg, #000, #0a2e16); padding: 25px; text-align: center; border-bottom: 2px solid var(--afc-gold); }
        .timer-hud { font-family: 'Bebas Neue'; font-size: 95px; color: var(--afc-gold); line-height: 1; cursor: pointer; transition: 0.3s; }
        .timer-hud:active { transform: scale(0.95); opacity: 0.7; }
        #stageLabel { font-weight: 900; color: var(--neon); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }

        .score-display { font-family: 'Bebas Neue'; font-size: 75px; color: white; background: transparent; border: none; text-align: center; width: 85px; }
        
        /* --- 🏆 KNOCKOUT DECIDER PANEL --- */
        #drawPanel { display: none; background: rgba(0,0,0,0.95); border: 2px solid var(--neon); border-radius: 15px; padding: 20px; margin-top: 15px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .admin-only { display: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border-top: 4px solid var(--afc-gold); z-index: 1001; }
        .nav-item { background: none; border: 1px solid #333; color: white; font-size: 10px; padding: 10px; border-radius: 8px; font-weight: 800; text-align: center; }
        .nav-item.active-nav { border-color: var(--afc-gold); color: var(--afc-gold); }

        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; }
        th { background: #000; color: var(--afc-gold); padding: 12px; font-size: 10px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: 700; }
    </style>
</head>
<body>

<div id="homePage" class="page active">
    <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;">
        <img src="48981.jpg" style="width:150px; margin-bottom:20px;" onerror="this.src='https://i.ibb.co/L6VshWf/48981.jpg'">
        <div style="font-family:'Bebas Neue'; font-size:55px; color:var(--afc-gold); line-height:0.9;">APL / <span>AFC</span></div>
        <div class="card" style="margin-top:40px; width:100%; max-width:320px;">
            <input type="password" id="pin" placeholder="ENTER PIN" class="input-field" style="text-align:center; font-size:20px;">
            <button class="btn-gold" onclick="auth()">OPEN HUB</button>
        </div>
    </div>
</div>

<div id="matchPage" class="page">
    <header>LIVE <span>MATCH CENTER</span></header>
    
    <div class="timer-card">
        <div id="stageLabel">1ST HALF (8M)</div>
        <div class="timer-hud" id="timeDisp" onclick="manualTimeEdit()">08:00</div>
        
        <div class="admin-only" id="timerControls" style="display: none; gap: 10px; justify-content: center; margin-top:20px;">
            <button onclick="ctrlTimer()" id="tBtn" class="btn-gold" style="width:120px; padding:10px;">START</button>
            <button onclick="resetMatchTimer()" class="btn-gold" style="width:60px; padding:10px; background:white;">↺</button>
        </div>
    </div>

    <section class="section">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; text-align: center;">
                <div style="flex:1">
                    <input type="text" id="tAName" placeholder="HOME" class="input-field" style="text-align:center; border:none; border-bottom:2px solid var(--neon); font-weight:900;">
                    <input type="number" id="sA" value="0" class="score-display">
                </div>
                <div style="font-family:'Bebas Neue'; color:var(--afc-gold); font-size:30px;">VS</div>
                <div style="flex:1">
                    <input type="text" id="tBName" placeholder="AWAY" class="input-field" style="text-align:center; border:none; border-bottom:2px solid var(--neon); font-weight:900;">
                    <input type="number" id="sB" value="0" class="score-display">
                </div>
            </div>

            <div id="drawPanel">
                <h3 style="color:var(--neon); font-size:12px; margin-bottom:15px; font-weight:900; text-align:center;">MATCH DRAWN! SELECT DECIDER:</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-gold" style="font-size:10px; background:var(--neon); color:black;" onclick="triggerExtraTime()">+5M EXTRA</button>
                    <button class="btn-gold" style="font-size:10px;" onclick="triggerPenalties()">PENALTY KICKS</button>
                </div>
                <div id="pkInput" style="display:none; margin-top:15px; text-align:center; border-top: 1px solid #333; padding-top:15px;">
                    <div style="font-size:10px; color:var(--afc-gold); margin-bottom:10px;">PK SHOOTOUT SCORE</div>
                    <input type="number" id="pkA" value="0" style="width:50px; background:none; border:1px solid gold; color:white; font-size:20px; text-align:center;">
                    <span style="margin:0 10px; font-weight:900;">-</span>
                    <input type="number" id="pkB" value="0" style="width:50px; background:none; border:1px solid gold; color:white; font-size:20px; text-align:center;">
                </div>
            </div>

            <button class="btn-gold admin-only" id="saveBtn" style="margin-top:25px; display:none;" onclick="saveFinalMatch()">SAVE FINAL RESULT</button>
        </div>
    </section>
</div>

<div id="dataPage" class="page">
    <header>LEAGUE <span>STANDINGS</span></header>
    <section class="section">
        <table>
            <thead><tr><th>TEAM</th><th>P</th><th>GD</th><th style="color:var(--afc-gold)">PTS</th></tr></thead>
            <tbody id="standingsBody"></tbody>
        </table>
        <div id="squadList" style="margin-top:30px;"></div>
    </section>
</div>

<div class="bottom-nav" id="mainNav" style="display: none;">
    <button class="nav-item active-nav" onclick="showPage('matchPage', this)">MATCH</button>
    <button class="nav-item" onclick="showPage('dataPage', this)">DATABASE</button>
    <button class="nav-item" onclick="location.reload()">LOGOUT</button>
</div>

<script>
    let db = {}; let sec = 480; let run = null; 
    let matchStage = 1; // 1: 1st Half, 2: Break, 3: 2nd Half, 4: FT
    let userRole = 'guest';

    function auth() {
        const pin = document.getElementById('pin').value;
        if(pin === "111000") { userRole = 'admin'; startApp(); }
        else if(pin === "2026") { userRole = 'guest'; startApp(); }
        else alert("ACCESS DENIED");
    }

    function startApp() {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('matchPage').style.display = 'block';
        document.getElementById('mainNav').style.display = 'grid';
        if(userRole === 'admin') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
            document.getElementById('saveBtn').style.display = 'block';
        } else {
            document.querySelectorAll('input').forEach(i => i.readOnly = true);
        }
        load();
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }
    }

    /* --- ⏱️ ADVANCED 8-2-8 TIMER ENGINE --- */
    function ctrlTimer() {
        if(run) { 
            clearInterval(run); run = null; 
            document.getElementById('tBtn').innerText = "RESUME"; 
        } else {
            document.getElementById('tBtn').innerText = "PAUSE";
            run = setInterval(() => {
                sec--; updateT();
                if(sec <= 0) {
                    clearInterval(run); run = null;
                    handleStageTransition();
                }
            }, 1000);
        }
    }

    function handleStageTransition() {
        if(matchStage === 1) { // End of 1st Half
            matchStage = 2; sec = 120; // 2 Min Break
            document.getElementById('stageLabel').innerText = "HT BREAK (2M)";
            alert("End of First Half! 2-Minute Break Starts.");
        } else if(matchStage === 2) { // End of Break
            matchStage = 3; sec = 480; // 2nd Half 8 Min
            document.getElementById('stageLabel').innerText = "2ND HALF (8M)";
            alert("Break Over! Second Half Starts.");
        } else { // End of 2nd Half
            matchStage = 4;
            document.getElementById('stageLabel').innerText = "FULL TIME";
            checkDrawStatus();
        }
        updateT();
        document.getElementById('tBtn').innerText = "START";
    }

    function checkDrawStatus() {
        const sA = parseInt(document.getElementById('sA').value) || 0;
        const sB = parseInt(document.getElementById('sB').value) || 0;
        if(sA === sB) {
            document.getElementById('drawPanel').style.display = 'block';
        }
    }

    function triggerExtraTime() {
        sec = 300; // 5 Min Extra
        document.getElementById('stageLabel').innerText = "EXTRA TIME (+5M)";
        document.getElementById('drawPanel').style.display = 'none';
        updateT();
    }

    function triggerPenalties() {
        document.getElementById('pkInput').style.display = 'block';
    }

    function manualTimeEdit() {
        if(userRole !== 'admin' || run) return;
        let mins = prompt("Set Custom Minutes:", Math.floor(sec/60));
        if(mins !== null) {
            sec = parseInt(mins) * 60;
            updateT();
        }
    }

    function updateT() {
        let m = Math.floor(sec/60), s = sec%60;
        document.getElementById('timeDisp').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function resetMatchTimer() {
        clearInterval(run); run = null;
        sec = 480; matchStage = 1;
        document.getElementById('stageLabel').innerText = "1ST HALF (8M)";
        document.getElementById('drawPanel').style.display = 'none';
        document.getElementById('pkInput').style.display = 'none';
        updateT();
    }

    /* --- 📊 DATA ENGINE --- */
    function saveFinalMatch() {
        const ta = document.getElementById('tAName').value.toUpperCase() || "TEAM A";
        const tb = document.getElementById('tBName').value.toUpperCase() || "TEAM B";
        const sa = parseInt(document.getElementById('sA').value) || 0;
        const sb = parseInt(document.getElementById('sB').value) || 0;
        const pkA = parseInt(document.getElementById('pkA').value) || 0;
        const pkB = parseInt(document.getElementById('pkB').value) || 0;

        if(!db[ta]) db[ta] = {p:0, gf:0, ga:0, pts:0};
        if(!db[tb]) db[tb] = {p:0, gf:0, ga:0, pts:0};

        db[ta].p++; db[tb].p++;
        db[ta].gf += sa; db[ta].ga += sb;
        db[tb].gf += sb; db[tb].ga += sa;

        // Points Logic: Winner of PK shootout also gets the 3 points.
        if(sa > sb || (sa === sb && pkA > pkB)) db[ta].pts += 3;
        else if(sb > sa || (sa === sb && pkB > pkA)) db[tb].pts += 3;

        updStandings(); persist(); resetMatchTimer();
        alert("Match Result Saved Successfully!");
    }

    function updStandings() {
        const b = document.getElementById('standingsBody'); b.innerHTML = "";
        const sorted = Object.keys(db).sort((x,y) => db[y].pts - db[x].pts || (db[y].gf-db[y].ga) - (db[x].gf-db[x].ga));
        sorted.forEach(t => { b.innerHTML += `<tr><td>${t}</td><td>${db[t].p}</td><td>${db[t].gf-db[t].ga}</td><td style="color:var(--afc-gold)">${db[t].pts}</td></tr>`; });
    }

    function persist() { if(userRole === 'admin') localStorage.setItem('apl_master_v33', JSON.stringify(db)); }
    function load() { const d = JSON.parse(localStorage.getItem('apl_master_v33')); if(d) { db=d; updStandings(); } }
</script>
</body>
</html>
