<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APL / AFC Authority Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { 
            --afc-gold: #c5a059; --afc-black: #000000; --neon: #00f2ff;
            --jeeva-red: #ff4757; --mgmt-blue: #3498db; --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Montserrat', sans-serif; background: var(--afc-black); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- 🚪 GATEWAY --- */
        .gateway-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        .gate-card { width: 100%; max-width: 350px; padding: 25px; background: #0a0a0a; border: 2px solid #222; border-radius: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .gate-card:hover { border-color: var(--afc-gold); transform: scale(1.02); }

        /* --- UI SYSTEM --- */
        .page { display: none; padding-bottom: 120px; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { background: #0a0a0a; padding: 15px; text-align: center; border-bottom: 3px solid var(--afc-gold); font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 2px; }
        .section { padding: 15px; max-width: 650px; margin: auto; }
        .card { background: var(--glass); border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        /* --- ROLE TAGS --- */
        .role-badge { font-size: 10px; padding: 5px 12px; border-radius: 50px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: inline-block; letter-spacing: 1px; }
        .owner-tag { background: var(--jeeva-red); color: white; box-shadow: 0 0 10px var(--jeeva-red); }
        .mgmt-tag { background: var(--mgmt-blue); color: white; }
        .guest-tag { background: #333; color: #aaa; }

        /* --- MATCH HUD --- */
        .timer-hud { font-family: 'Bebas Neue'; font-size: 90px; color: var(--afc-gold); line-height: 1; text-align: center; margin: 10px 0; }
        .btn-gold { width: 100%; padding: 16px; background: var(--afc-gold); color: black; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .input-field { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--afc-gold); color: white; border-radius: 8px; margin-bottom: 10px; }

        /* --- ACCESS CONTROL --- */
        .owner-only, .mgmt-only { display: none; }

        /* --- NAVIGATION --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; border-top: 4px solid var(--afc-gold); z-index: 1001; }
        .nav-item { background: none; border: 1px solid #333; color: white; font-size: 9px; padding: 10px; border-radius: 8px; font-weight: 800; text-align: center; }
    </style>
</head>
<body>

<div id="gateSelection" class="gateway-screen">
    <img src="48981.jpg" style="width:120px; margin-bottom:20px;" onerror="this.src='https://i.ibb.co/L6VshWf/48981.jpg'">
    <h1 style="font-family:'Bebas Neue'; color:var(--afc-gold); margin-bottom:30px;">APL / AFC GATEWAY</h1>
    <div class="gate-card" onclick="setTourney('U16')">
        <h2 style="color:var(--neon);">UNDER 16</h2>
        <p style="font-size:10px; color:#555;">8 TEAMS • 2010 ELIGIBILITY</p>
    </div>
    <div class="gate-card" onclick="setTourney('U19')">
        <h2 style="color:var(--afc-gold);">UNDER 19</h2>
        <p style="font-size:10px; color:#555;">16 TEAMS • 2007 ELIGIBILITY</p>
    </div>
</div>

<div id="authPage" class="page">
    <div class="gateway-screen">
        <h2 id="authTitle" style="font-family:'Bebas Neue'; font-size:40px; margin-bottom:20px;">AUTHORIZE</h2>
        <div class="card" style="width:320px;">
            <select id="roleSelect" class="input-field">
                <option value="owner">ADMIN OWNER (JEEVA)</option>
                <option value="mgmt">MANAGEMENT (OFFICIALS)</option>
                <option value="guest">GUEST (TEAMS)</option>
            </select>
            <input type="password" id="pinInput" placeholder="ENTER PIN" class="input-field" style="text-align:center; font-size:20px;">
            <button class="btn-gold" onclick="verifyAccess()">LOGIN HUB</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#444; margin-top:15px; font-size:10px;">← CHANGE TOURNAMENT</button>
        </div>
    </div>
</div>

<div id="hubPage" class="page">
    <header id="hubHeader">AJJOOR PREMIER LEAGUE</header>

    <div class="section">
        <div id="roleBadgeContainer" style="text-align:center; margin-top:5px;"></div>
        
        <div id="matchTab" class="view">
            <div class="card" style="text-align:center; background: linear-gradient(180deg, #000, #0a2e16);">
                <div id="stageLabel" style="font-size:10px; font-weight:900; color:var(--neon);">READY</div>
                <div class="timer-hud" id="timeDisp">08:00</div>
                <div class="mgmt-only" style="margin-top:15px; justify-content:center; gap:10px;">
                    <button class="btn-gold" onclick="ctrlTimer()" style="width:120px; padding:10px;">START</button>
                    <button class="btn-gold" onclick="resetT()" style="width:60px; padding:10px; background:white;">↺</button>
                </div>
            </div>

            <div class="card owner-only" style="border: 1px solid var(--jeeva-red);">
                <h3 style="color:var(--jeeva-red); font-size:12px; margin-bottom:10px;">ADMIN LEDGER</h3>
                <div style="display:flex; justify-content:space-between; font-weight:900;">
                    <span>FUND BALANCE:</span>
                    <span style="color:var(--neon);">₹ 0.00</span>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <input type="text" id="tA" placeholder="TEAM A" class="input-field" style="width:40%; text-align:center;">
                    <b style="color:var(--afc-gold);">VS</b>
                    <input type="text" id="tB" placeholder="TEAM B" class="input-field" style="width:40%; text-align:center;">
                </div>
                <button class="btn-gold mgmt-only" style="margin-top:10px;" onclick="alert('Match Saved')">SAVE RESULT</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item">MATCH</button>
        <button class="nav-item">STANDINGS</button>
        <button class="nav-item mgmt-only">SCANNER</button>
        <button class="nav-item" onclick="location.reload()">LOGOUT</button>
    </div>
</div>

<script>
    let activeTourney = '';
    let currentUser = '';

    function setTourney(cat) {
        activeTourney = cat;
        document.getElementById('gateSelection').style.display = 'none';
        document.getElementById('authPage').classList.add('active');
        document.getElementById('authTitle').innerText = cat + " AUTH";
    }

    function verifyAccess() {
        const role = document.getElementById('roleSelect').value;
        const pin = document.getElementById('pinInput').value;

        // 🔒 SECURITY FIREWALL
        if (role === 'owner' && pin === '190107') {
            currentUser = 'owner';
            launchHub('owner');
        } else if (role === 'mgmt' && pin === '111000') {
            currentUser = 'mgmt';
            launchHub('mgmt');
        } else if (role === 'guest' && pin === '2026') {
            currentUser = 'guest';
            launchHub('guest');
        } else {
            alert("ACCESS DENIED: INVALID PIN");
        }
    }

    function launchHub(role) {
        document.getElementById('authPage').classList.remove('active');
        document.getElementById('hubPage').classList.add('active');
        document.getElementById('hubHeader').innerHTML = `AFC ${activeTourney} WORLD HUB`;
        
        const badge = document.getElementById('roleBadgeContainer');
        if(role === 'owner') {
            badge.innerHTML = `<span class="role-badge owner-tag">OWNER: JEEVA</span>`;
            document.querySelectorAll('.mgmt-only, .owner-only').forEach(e => e.style.display = 'flex');
        } else if(role === 'mgmt') {
            badge.innerHTML = `<span class="role-badge mgmt-tag">OFFICIAL: AJJOOR MGMT</span>`;
            document.querySelectorAll('.mgmt-only').forEach(e => e.style.display = 'flex');
        } else {
            badge.innerHTML = `<span class="role-badge guest-tag">GUEST: VIEW ONLY</span>`;
            document.querySelectorAll('input').forEach(i => i.readOnly = true);
        }
    }

    let sec = 480; let run = null;
    function ctrlTimer() {
        if(run) { clearInterval(run); run = null; }
        else { run = setInterval(() => { sec--; updateT(); if(sec<=0) clearInterval(run); }, 1000); }
    }
    function updateT() { let m=Math.floor(sec/60), s=sec%60; document.getElementById('timeDisp').innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`; }
    function resetT() { sec = 480; updateT(); clearInterval(run); run = null; }
</script>
</body>
</html>
