<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSL | 2026 Pro Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --isl-navy: #001d3d; --isl-blue: #003566; --isl-gold: #ffc300;
            --isl-white: #ffffff; --isl-red: #d90429; --isl-bluecard: #007bff;
            --isl-grey: #f4f4f9; --win: #2ecc71;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Montserrat', sans-serif; background: var(--isl-grey); color: var(--isl-navy); padding-bottom: 160px; }
        
        /* 2026 LIVE TICKER */
        .live-ticker {
            background: var(--isl-gold); color: var(--isl-navy); padding: 8px 0;
            font-size: 11px; font-weight: 800; overflow: hidden; white-space: nowrap;
            border-bottom: 2px solid var(--isl-navy); position: sticky; top: 0; z-index: 1001;
        }
        .ticker-move { display: inline-block; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { background: var(--isl-navy); padding: 15px; text-align: center; border-bottom: 4px solid var(--isl-gold); }
        .logo { font-family: 'Bebas Neue'; font-size: 30px; color: var(--isl-white); }
        .logo span { color: var(--isl-gold); }

        .hero-card { background: linear-gradient(135deg, var(--isl-navy) 0%, var(--isl-blue) 100%); color: white; border-radius: 0 0 25px 25px; padding: 25px 15px; text-align: center; }
        .timer-hud { font-family: 'Bebas Neue'; font-size: 70px; color: var(--isl-gold); text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        .section { padding: 15px; max-width: 650px; margin: auto; }
        .card { background: var(--isl-white); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .score-display { font-family: 'Bebas Neue'; font-size: 60px; color: var(--isl-navy); background: transparent; border: none; text-align: center; width: 75px; }

        /* 2026 RULE BADGES */
        .rule-btn { font-size: 9px; font-weight: 800; padding: 8px; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; color: white; }
        .btn-blue { background: var(--isl-bluecard); }
        .btn-red { background: var(--isl-red); }
        .btn-gold { background: var(--isl-gold); color: var(--isl-navy); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--isl-navy); padding: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; border-top: 4px solid var(--isl-gold); z-index: 1001; }
        .nav-item { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 2px; font-size: 8px; border-radius: 5px; text-align: center; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        td, th { padding: 12px 8px; border-bottom: 1px solid #eee; font-size: 11px; text-align: center; }
        .modal { position: fixed; inset: 0; background: var(--isl-grey); z-index: 2000; overflow-y: auto; display: none; }
    </style>
</head>
<body>

<div class="live-ticker">
    <div class="ticker-move" id="tickerText">
        ⚽ 2026 RULESET ACTIVE: BLUE CARD SIN-BINS ENABLED • 8-SECOND KEEPER RULE IN EFFECT • CAPTAINS-ONLY ZONES ACTIVE • RECORD GOALS LIVE! ⚽
    </div>
</div>

<header><div class="logo">PRO ELITE <span>v7.0 (2026)</span></div></header>

<div id="loginView">
    <div class="hero-card"><h1 style="font-family: 'Bebas Neue'; font-size: 40px;">TOURNAMENT ENGINE</h1></div>
    <section class="section"><div class="card"><input type="password" id="pin" placeholder="ENTER ACCESS KEY" style="width:100%; padding:15px; text-align:center; border-radius:10px;"><button class="btn-gold" style="width:100%; padding:15px; margin-top:10px; border-radius:10px; font-weight:800;" onclick="auth()">UNLOCK ENGINE</button></div></section>
</div>

<div id="dashboard" style="display: none;">
    <div class="hero-card">
        <div class="timer-hud" id="timeDisp">20:00</div>
        <div style="display: flex; gap: 8px; margin-top: 15px;">
            <button class="nav-item" style="flex: 1; font-size: 12px;" onclick="ctrlTimer()">START/PAUSE</button>
            <button class="nav-item" style="width: 25%; font-size: 12px;" onclick="rstTimer()">↺</button>
        </div>
    </div>

    <section class="section">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; text-align: center;">
                <div style="flex:1">
                    <input type="text" id="tAName" placeholder="HOME" style="text-align: center; border: none; font-weight: 800; width: 100%; border-bottom: 1px dashed #ccc;">
                    <input type="number" id="sA" value="0" class="score-display">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 10px;">
                        <button class="rule-btn btn-gold" onclick="logE('A','GOAL')">GOAL</button>
                        <button class="rule-btn btn-blue" onclick="logE('A','BLUE')">BLUE</button>
                    </div>
                </div>
                <div style="font-family: 'Bebas Neue'; color: #ccc; font-size: 20px;">VS</div>
                <div style="flex:1">
                    <input type="text" id="tBName" placeholder="AWAY" style="text-align: center; border: none; font-weight: 800; width: 100%; border-bottom: 1px dashed #ccc;">
                    <input type="number" id="sB" value="0" class="score-display">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 10px;">
                        <button class="rule-btn btn-gold" onclick="logE('B','GOAL')">GOAL</button>
                        <button class="rule-btn btn-blue" onclick="logE('B','BLUE')">BLUE</button>
                    </div>
                </div>
            </div>
            <button id="saveBtn" class="btn-gold" style="width:100%; padding:15px; margin-top:20px; border-radius:10px; font-weight:800;" onclick="saveMatch()">FINAL WHISTLE</button>
        </div>

        <div style="font-family:'Bebas Neue'; font-size:22px; margin-bottom:10px;">ELITE STANDINGS</div>
        <table>
            <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>GD</th><th style="color:var(--isl-blue)">PTS</th></tr></thead>
            <tbody id="standingsBody"></tbody>
        </table>
    </section>

    <div class="bottom-nav">
        <button class="nav-item" onclick="openM('rosMod')">SQUADS</button>
        <button class="nav-item" onclick="openM('statMod')">SIN BIN</button>
        <button class="nav-item" onclick="openM('bootMod')">BOOT</button>
        <button class="nav-item" onclick="shareWA()">SHARE</button>
        <button class="nav-item" style="background:var(--win)" onclick="persistData()">SAVE</button>
    </div>
</div>

<div id="rosMod" class="modal"><header><div class="logo">2026 <span>SQUAD REGISTRY</span></div></header><section class="section" id="rosCont"></section><button class="btn-gold" style="width:100%; padding:15px;" onclick="closeM('rosMod')">SAVE & EXIT</button></div>
<div id="bootMod" class="modal"><header><div class="logo">GOLDEN <span>BOOT 2026</span></div></header><section class="section"><div class="card"><table><thead><tr><th>PLAYER</th><th>GOALS</th></tr></thead><tbody id="bootBody"></tbody></table></div></section><button class="btn-gold" style="width:100%; padding:15px;" onclick="closeM('bootMod')">CLOSE</button></div>
<div id="statMod" class="modal"><header><div class="logo">SIN BIN <span>TRACKER</span></div></header><section class="section" id="sinBinLog"></section><button class="btn-gold" style="width:100%; padding:15px;" onclick="closeM('statMod')">BACK</button></div>

<script>
    let db = {}; let scorers = {}; let blueBans = []; let admin = false; let sec = 1200; let run = null;

    function auth() {
        const p = document.getElementById('pin').value;
        if(p === "110710" || p === "2026") { admin = (p === "110710"); start(); }
        else alert("Invalid Access Key");
    }

    function start() {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        if(!admin) document.querySelectorAll('#saveBtn, button[onclick*="persist"], button[onclick*="logE"], #timerConfig').forEach(el => el.style.display = 'none');
        buildRos();
    }

    function logE(side, type) {
        if(!admin) return;
        const p = prompt(`${type} for ${side}. Player Name:`);
        if(p) {
            if(type === 'GOAL') {
                scorers[p] = (scorers[p] || 0) + 1;
                document.getElementById(`s${side}`).value = parseInt(document.getElementById(`s${side}`).value) + 1;
                document.getElementById('tickerText').innerText = `🔥 GOAL ALERT: ${p.toUpperCase()} SCORES! • `;
            } else if (type === 'BLUE') {
                blueBans.push({name: p, time: document.getElementById('timeDisp').innerText});
                document.getElementById('sinBinLog').innerHTML += `<div class="card" style="border-left:8px solid var(--isl-bluecard)">🟦 BLUE CARD: ${p} (${document.getElementById('timeDisp').innerText}) - 2 MIN SIN BIN</div>`;
                document.getElementById('tickerText').innerText = `⚠️ DISCIPLINE: ${p.toUpperCase()} SENT TO SIN BIN • `;
            }
        }
    }

    function saveMatch() {
        const ta = document.getElementById('tAName').value.toUpperCase() || "TEAM A";
        const tb = document.getElementById('tBName').value.toUpperCase() || "TEAM B";
        const sa = parseInt(document.getElementById('sA').value);
        const sb = parseInt(document.getElementById('sB').value);

        [ta, tb].forEach(t => { if(!db[t]) db[t] = {p:0, w:0, gf:0, ga:0, pts:0}; });
        db[ta].p++; db[tb].p++;
        db[ta].gf += sa; db[ta].ga += sb;
        db[tb].gf += sb; db[tb].ga += sa;

        if(sa > sb) { db[ta].w++; db[ta].pts += 3; }
        else if(sb > sa) { db[tb].w++; db[tb].pts += 3; }
        else { db[ta].pts += 1; db[tb].pts += 1; }

        updStandings(); updBoot(); rstEngine();
        document.getElementById('tickerText').innerText = `🏁 MATCH OVER: ${ta} ${sa}-${sb} ${tb} • TABLE UPDATED • `;
    }

    function updStandings() {
        const b = document.getElementById('standingsBody'); b.innerHTML = "";
        const sorted = Object.keys(db).sort((x,y) => db[y].pts - db[x].pts || (db[y].gf-db[y].ga) - (db[x].gf-db[x].ga));
        sorted.forEach(t => {
            b.innerHTML += `<tr><td>${t}</td><td>${db[t].p}</td><td>${db[t].w}</td><td>${db[t].gf - db[t].ga}</td><td style="font-weight:800; color:var(--isl-blue)">${db[t].pts}</td></tr>`;
        });
    }

    function updBoot() {
        const b = document.getElementById('bootBody'); b.innerHTML = "";
        Object.keys(scorers).sort((x,y) => scorers[y] - scorers[x]).forEach(p => {
            b.innerHTML += `<tr><td>${p}</td><td>${scorers[p]}</td></tr>`;
        });
    }

    function shareWA() {
        let text = "*🏆 VSL 2026 STANDINGS* \n\nTEAM | P | W | GD | *PTS*\n";
        Object.keys(db).forEach(t => text += `${t} | ${db[t].p} | ${db[t].w} | ${db[t].gf-db[t].ga} | *${db[t].pts}*\n`);
        window.open("https://wa.me/?text=" + encodeURIComponent(text), '_blank');
    }

    function rstEngine() { ['sA','sB'].forEach(i => document.getElementById(i).value = 0); rstTimer(); }
    function ctrlTimer() { if(run) { clearInterval(run); run = null; } else { run = setInterval(() => { sec--; updateT(); }, 1000); } }
    function updateT() { let m = Math.floor(sec/60); let s = sec%60; document.getElementById('timeDisp').innerText = `${m}:${s<10?'0':''}${s}`; }
    function rstTimer() { sec = 1200; updateT(); }
    
    function buildRos() {
        const c = document.getElementById('rosCont'); c.innerHTML = "";
        for(let t=1; t<=16; t++) {
            c.innerHTML += `<div class="card"><input type="text" placeholder="TEAM ${t} NAME" style="font-weight:800; border-bottom:2px solid var(--isl-gold);"><input type="text" placeholder="2026 NOMINATED CAPTAIN"></div>`;
        }
    }
    
    function persistData() { localStorage.setItem('vsl_2026_pro', JSON.stringify({ db, scorers, blueBans })); alert("Tournament State Saved!"); }
    function openM(id) { document.getElementById(id).style.display = 'block'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
