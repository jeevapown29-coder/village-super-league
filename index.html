<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APL | Ultimate Knockout v18</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --apl-gold: #ffc300; --neon-blue: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1510279750247-07759f6209f7?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed; color: white; padding-bottom: 160px;
        }
        .broadcast-ticker {
            background: var(--apl-gold); color: black; padding: 10px 0; font-weight: 900; font-size: 11px;
            text-transform: uppercase; overflow: hidden; white-space: nowrap; border-bottom: 3px solid var(--neon-blue);
            position: sticky; top: 0; z-index: 1002;
        }
        .ticker-wrap { display: inline-block; animation: scrollText 30s linear infinite; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { background: rgba(0,0,0,0.95); padding: 20px; text-align: center; border-bottom: 2px solid var(--apl-gold); }
        .logo { font-family: 'Bebas Neue'; font-size: 35px; letter-spacing: 2px; }
        .logo span { color: var(--apl-gold); }

        .hero-card { background: rgba(0,0,0,0.6); padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .timer-hud { font-family: 'Bebas Neue'; font-size: 90px; color: var(--apl-gold); line-height: 1; }
        
        .section { padding: 15px; max-width: 650px; margin: auto; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .score-display { font-family: 'Bebas Neue'; font-size: 70px; color: white; background: transparent; border: none; text-align: center; width: 85px; }
        
        .draw-panel { background: rgba(0,0,0,0.9); border: 2px solid var(--neon-blue); border-radius: 15px; padding: 20px; margin-top: 15px; display: none; }
        .btn-gold { width: 100%; padding: 16px; background: var(--apl-gold); color: black; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; border-top: 4px solid var(--apl-gold); z-index: 1001; }
        .nav-item { background: rgba(255,255,255,0.05); color: white; padding: 12px 2px; font-size: 10px; border-radius: 10px; text-align: center; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }

        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.8); border-radius: 15px; overflow: hidden; }
        th { background: #000; color: var(--apl-gold); padding: 15px; font-size: 12px; font-family: 'Bebas Neue'; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 700; text-align: center; }
    </style>
</head>
<body>

<div class="broadcast-ticker">
    <div class="ticker-wrap" id="liveTicker">
        🏆 AJJOOR PREMIER LEAGUE 2026 • 8-2-8 FORMAT • DRAW DETECTED? AUTOMATIC EXTRA TIME OR PENALTY OPTIONS ENABLED • 🏆
    </div>
</div>

<header><div class="logo">APL <span>KNOCKOUT v18</span></div></header>

<div id="loginView">
    <section class="section">
        <div class="card" style="text-align: center;">
            <h2 style="font-family:'Bebas Neue'; color:var(--apl-gold); margin-bottom:20px;">ENGINE ACCESS</h2>
            <input type="password" id="pin" placeholder="ADMIN PIN" style="width:100%; text-align:center; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--apl-gold); color: white; border-radius: 10px; margin-bottom: 15px;">
            <button class="btn-gold" onclick="auth()">OPEN HUB</button>
        </div>
    </section>
</div>

<div id="dashboard" style="display: none;">
    <div class="hero-card">
        <div id="stageLabel" style="font-weight:900; color:var(--apl-gold); font-size:11px; letter-spacing:1px; margin-bottom:5px;">STADIUM READY</div>
        <div class="timer-hud" id="timeDisp">08:00</div>
        <div style="display: flex; gap: 10px; margin-top: 15px; justify-content: center;">
            <button class="nav-item" style="width: 110px; color: var(--apl-gold); border-color: var(--apl-gold); font-size: 16px;" id="tBtn" onclick="ctrlTimer()">START</button>
            <button class="nav-item" style="width: 60px; font-size: 16px;" onclick="fullRst()">↺</button>
        </div>
    </div>

    <section class="section">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; text-align: center;">
                <div style="flex:1">
                    <input type="text" id="tAName" placeholder="HOME" style="text-align: center; border: none; font-weight: 900; background: transparent; color: white; width: 100%; border-bottom: 2px solid var(--neon-blue); font-size: 16px;">
                    <input type="number" id="sA" value="0" class="score-display">
                </div>
                <div style="font-family: 'Bebas Neue'; color: var(--apl-gold); font-size: 30px;">VS</div>
                <div style="flex:1">
                    <input type="text" id="tBName" placeholder="AWAY" style="text-align: center; border: none; font-weight: 900; background: transparent; color: white; width: 100%; border-bottom: 2px solid var(--neon-blue); font-size: 16px;">
                    <input type="number" id="sB" value="0" class="score-display">
                </div>
            </div>

            <div id="drawPanel" class="draw-panel">
                <h3 style="color:var(--neon-blue); font-size:12px; margin-bottom:15px; font-weight:900; text-align:center;">MATCH DRAWN! SELECT DECIDER:</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn-gold" style="font-size:10px; background:var(--neon-blue);" onclick="triggerExtra()">+5M EXTRA TIME</button>
                    <button class="btn-gold" style="font-size:10px;" onclick="triggerPenalties()">PENALTY KICKS</button>
                </div>
                
                <div id="penInput" style="display:none; margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                    <div style="display: flex; justify-content: center; gap: 20px; align-items: center;">
                        <input type="number" id="pA" value="0" style="width:60px; font-size:30px; text-align:center; background:none; border:2px solid var(--apl-gold); color:white; font-family:'Bebas Neue';">
                        <span style="font-weight:900; font-family:'Bebas Neue'; color:var(--apl-gold);">PK</span>
                        <input type="number" id="pB" value="0" style="width:60px; font-size:30px; text-align:center; background:none; border:2px solid var(--apl-gold); color:white; font-family:'Bebas Neue';">
                    </div>
                </div>
            </div>

            <button class="btn-gold" style="margin-top: 25px;" onclick="saveFinalMatch()">SAVE FINAL RESULT</button>
        </div>

        <div style="font-family:'Bebas Neue'; font-size:28px; margin-bottom:10px; color: var(--apl-gold); text-align: center;">APL LEAGUE TABLE</div>
        <table>
            <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>GD</th><th style="color:var(--apl-gold)">PTS</th></tr></thead>
            <tbody id="standingsBody"></tbody>
        </table>
    </section>

    <div class="bottom-nav">
        <button class="nav-item" onclick="persistData()">SAVE DATA</button>
        <button class="nav-item" onclick="shareWA()">SHARE</button>
        <button class="nav-item" style="color: #ff4d4d;" onclick="softReset()">WIPE</button>
    </div>
</div>

<script>
    let db = {}; let sec = 480; let run = null; let matchStage = 1;

    function auth() {
        if(document.getElementById('pin').value === "110710" || document.getElementById('pin').value === "2026") {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else alert("INVALID ACCESS PIN");
    }

    function ctrlTimer() {
        if (run) { clearInterval(run); run = null; document.getElementById('tBtn').innerText = "RESUME"; }
        else {
            document.getElementById('tBtn').innerText = "PAUSE";
            run = setInterval(() => { 
                sec--; updateT(); 
                if (sec <= 0) { clearInterval(run); run = null; nextStage(); }
            }, 1000);
        }
    }

    function nextStage() {
        if(matchStage === 1) { 
            matchStage = 2; sec = 120; document.getElementById('stageLabel').innerText = "HALF-TIME BREAK (2M)";
        } else if(matchStage === 2) { 
            matchStage = 3; sec = 480; document.getElementById('stageLabel').innerText = "2ND HALF (8M)";
        } else if(matchStage === 3 || matchStage === 4) { 
            document.getElementById('stageLabel').innerText = "MATCH OVER";
            if(parseInt(document.getElementById('sA').value) === parseInt(document.getElementById('sB').value)) {
                document.getElementById('drawPanel').style.display = 'block';
                document.getElementById('liveTicker').innerText = "⚠️ DRAW DETECTED! DECISION REQUIRED: EXTRA TIME OR PENALTIES? ⚠️";
            }
        }
        updateT();
        document.getElementById('tBtn').innerText = "START";
    }

    function triggerExtra() {
        matchStage = 4; sec = 300; // Automatic 5 min
        document.getElementById('stageLabel').innerText = "EXTRA TIME (+5M)";
        document.getElementById('drawPanel').style.display = 'none';
        updateT();
    }

    function triggerPenalties() {
        document.getElementById('penInput').style.display = 'block';
        document.getElementById('liveTicker').innerText = "🔥 PENALTY SHOOTOUT IN PROGRESS • AJJOOR PREMIER LEAGUE 🔥";
    }

    function updateT() {
        let m = Math.floor(sec/60); let s = sec%60;
        document.getElementById('timeDisp').innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function fullRst() { clearInterval(run); run = null; sec = 480; matchStage = 1; updateT(); document.getElementById('drawPanel').style.display = 'none'; document.getElementById('penInput').style.display = 'none'; document.getElementById('stageLabel').innerText = "STADIUM READY"; }

    function saveFinalMatch() {
        const ta = document.getElementById('tAName').value.toUpperCase() || "TEAM A";
        const tb = document.getElementById('tBName').value.toUpperCase() || "TEAM B";
        const sa = parseInt(document.getElementById('sA').value);
        const sb = parseInt(document.getElementById('sB').value);
        const pa = parseInt(document.getElementById('pA').value);
        const pb = parseInt(document.getElementById('pB').value);

        [ta, tb].forEach(t => { if(!db[t]) db[t] = {p:0, w:0, gf:0, ga:0, pts:0}; });
        db[ta].p++; db[tb].p++;
        db[ta].gf += sa; db[ta].ga += sb;
        db[tb].gf += sb; db[tb].ga += sa;

        // Points only for winner
        if(sa > sb || (sa === sb && pa > pb)) { db[ta].w++; db[ta].pts += 3; } 
        else if(sb > sa || (sa === sb && pb > pa)) { db[tb].w++; db[tb].pts += 3; }
        else if(sa === sb && pa === pb && document.getElementById('drawPanel').style.display === 'block') {
            alert("Winner must be decided!"); return;
        }

        updStandings(); fullRst(); ['sA','sB','pA','pB'].forEach(i => document.getElementById(i).value = 0);
    }

    function updStandings() {
        const b = document.getElementById('standingsBody'); b.innerHTML = "";
        const sorted = Object.keys(db).sort((x,y) => db[y].pts - db[x].pts || (db[y].gf-db[y].ga) - (db[x].gf-db[x].ga));
        sorted.forEach(t => { b.innerHTML += `<tr><td>${t}</td><td>${db[t].p}</td><td>${db[t].w}</td><td>${db[t].gf - db[t].ga}</td><td style="color:var(--apl-gold);">${db[t].pts}</td></tr>`; });
    }

    function persistData() { localStorage.setItem('apl_v18_final', JSON.stringify(db)); alert("DATA SYNCED!"); }
    function softReset() { if(confirm("Clear all?")) { db = {}; updStandings(); fullRst(); } }
    function shareWA() { /* WA logic */ }
</script>
</body>
</html>
